let currentCategory = "all";
let currentPrompt = "";
let liked = [];

const tabsDiv = document.getElementById("tabs");

categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.innerText = cat;
  btn.onclick = () => {
    currentCategory = cat;
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    generatePrompt();
  };
  tabsDiv.appendChild(btn);
});

tabsDiv.children[0].classList.add("active");

function getAllPrompts(){
  return Object.values(prompts).flat();
}

function generatePrompt(){
  let list = currentCategory==="all" ? getAllPrompts() : prompts[currentCategory];
  currentPrompt = list[Math.floor(Math.random()*list.length)];

  let i = 0;
  let n1 = document.getElementById("name1").value || "Name 1";
  let n2 = document.getElementById("name2").value || "Name 2";

  const text = currentPrompt.replace(/\[insert name\]/g, ()=>{
    return i++ % 2 === 0 ? n1 : n2;
  });

  document.getElementById("promptBox").innerText = text;
}

function toggleLike(){
  if(liked.includes(currentPrompt)){
    liked = liked.filter(p=>p!==currentPrompt);
  } else {
    liked.push(currentPrompt);
  }
  renderSaved();
}

function renderSaved(){
  const div = document.getElementById("saved");
  div.innerHTML="";
  liked.forEach(p=>{
    const el = document.createElement("div");
    el.innerText = p;
    el.onclick = ()=> {
      currentPrompt = p;
      generatePrompt();
    };
    div.appendChild(el);
  });
}

function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById("promptBox").innerText);
}
